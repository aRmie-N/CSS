    <h1>Kod CSS</h1>

    <textarea readonly
        style="border:1px solid black; width:600px; height:450px; padding:5px; font-family:monospace; resize:none;">

/* Mykhailo Polishchuk */

/* Normalne odnośniki */
A
{
    font-size:24pt;
    text-decoration:none;
}

A:link
{
    color:navy;
}

A:visited
{
    color:green;
}

A:hover
{
    color:red;
    text-decoration:underline;
}

/* Małe odnośniki */
A.maly
{
    font-size:12pt;
}

A.maly:link
{
    color:silver;
}

A.maly:visited
{
    color:yellow;
}

A.maly:hover
{
    color:black;
    text-decoration:none;
}

A:active
{
    color:silver;
}
