                <li>Z div'a powinno się korzystać kiedy potrzebujemy wyodrębnić poszczególne<br>
                    bloki w układzie dokumentu, na przykład lewa kolumna, menu nawigacyjne,<br>
                    stopka.<br>
                </li><br>
                <li>Służy do utworzenia sekcji (bloku) w pliku HTML w celu ich sformatowania za pomocą<br>
                    arkusza stylów CSS.</li><br>
            </ul><br>
        </span><br>
