<body>
    Autor: Mykhailo Polishchuk klasa 1P<br>
    mam na imię Mykhailo czyli 8 liter M=8<br>
    mam nazwisko Polishchuk czyli 10 liter P=10<br>
    mój numer z dziennika to 18<br>
    data urodzenia: 29.06.2010, numer buta=9<br>
    numer miesiąca urodzenia=6(czerwiec)<br>
    numer dnia urodzenia=29(dwudziesty dziewiąty dzień)<br>
    ======================================<br>
    definiowanie koloru znacznika p<br>
    Zmiana kolor liter --> sposobem pierwszym z tabeli/instrukcja<br>
    100+numer miesiąca urodzenia=100+6=(106)10=(#6A)H<br>
    150+numer dnia urodzenia=150+29=(179)10=(#B3)H
    50+numer buta=50+9=(59)10=(#3B)H<br>
    czyli kolor w HEXA #6AB33B dla znacznika p<br>
    wypisz: znacznik p -->{color:#6AB33B;}, wielkość liter 10+P=20mm<br>
    ======================================<br>
    definiowanie koloru znacznika body<br>
    Zmiana kolor liter --> sposobem czwartym z tabeli/instrukcja<br>
    R=125+numer dnia urodzenia=125+29=154 R=154/255*100%=60%<br>
    G=50+numer buta=50+9=59 G=59/255*100%=23%<br>
    B=200+numer miesiąca urodzenia=200+6=206 B=206/255*100%=80%<br>
    czyli kolor w RGB 60%,23%,80% dla znacznika body<br>
    wypisz: znacznik body -->{color:rgb(60%,23%,80%);}, wielkość liter 10+M=18mm<br>
    <p>:) uśmiech</p>
    :P wytknięty język
    <p>:'( płacz</p>
    :D szczęście
    <p>:( smutek</p>
    >:( złość
</body>
