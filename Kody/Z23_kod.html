    <p id="pogrubienie_polishchuk">Polishchuk<br>Ilu programistów potrzeba do wkręcenia żarówki?<br>
        Żadnego — to problem sprzętowy.</p>
    <p id="pochylona_polishchuk">Polishchuk<br>Programista mówi do żony:<br>
        „Zaraz wracam, idę po chleb.”<br>
        Wraca po 3 godzinach z 5 chlebami, bo żona powiedziała:<br>
        „Jak będą jajka, to weź 10.”</p>
    <p id="index_gorny_polishchuk">Polishchuk<br>Dlaczego programiści mylą Halloween z Bożym Narodzeniem?<br>
        Bo 31 OCT = 25 DEC.</p>
    <p id="index_dolny_polishchuk">Polishchuk<br>Co mówi programista, gdy widzi błąd?<br>
        „To nie bug, to feature!”</p>
    <p id="mono_polishchuk">Polishchuk<br>Dlaczego programista nie lubi natury?<br>
        Bo ma za dużo bugów.</p>
    <p id="powiekszenie_polishchuk">Polishchuk<br>Jak programista bierze prysznic?<br>
        Najpierw czyta instrukcję: „namydlić, spłukać, powtórzyć”… i powtarza w nieskończoność.</p>
    <p id="pomniejszenie_polishchuk">Polishchuk<br>Dlaczego programista zawsze zamyka drzwi?<br>
        Bo nie lubi otwartych portów.</p>
